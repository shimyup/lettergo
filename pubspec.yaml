name: letter_go
description: "LetterGo — 당신의 진심이 세계를 유람하며 인연을 만나는 곳"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
